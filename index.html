<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ôn tập Cuối kì 2 - môn GD KT-PL (Bài 17 - Bài 21)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: auto;
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            min-height: 500px;
        }
        h1, h2 {
            text-align: center;
            color: #2c3e50;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
        }
        h2 { font-size: 1.4em; margin-top: 40px; color: #d35400; border-bottom: 2px dashed #e67e22; }
        
        #btn-toggle-prefix {
            position: fixed; top: 15px; right: 15px; background-color: #9b59b6; color: white;
            border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer;
            font-weight: bold; z-index: 1000; box-shadow: 0 4px 6px rgba(0,0,0,0.2); transition: background 0.3s;
        }
        #btn-toggle-prefix:hover { background-color: #8e44ad; }
        
        body.hide-q-prefix .q-prefix { display: none; }

        #menu-screen { text-align: center; padding: 40px 20px; }
        .mode-btn {
            display: inline-block; width: 45%; margin: 10px; padding: 20px;
            font-size: 1.2em; font-weight: bold; color: white; border: none; border-radius: 10px; 
            cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
        }
        .mode-btn:hover { transform: translateY(-5px); box-shadow: 0 6px 12px rgba(0,0,0,0.2); }
        .btn-mode1 { background: linear-gradient(135deg, #3498db, #2980b9); }
        .btn-mode2 { background: linear-gradient(135deg, #e67e22, #d35400); }
        
        .header-controls {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; border-bottom: 1px solid #ddd; padding-bottom: 10px;
        }
        .btn-back { background: #95a5a6; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold;}
        .btn-back:hover { background: #7f8c8d; }

        .question-block { margin-bottom: 25px; padding: 15px; border: 1px solid #ddd; border-radius: 8px; background-color: #fafafa; }
        .question-title { font-weight: bold; font-size: 1.1em; margin-bottom: 15px; color: #2c3e50; white-space: pre-wrap; }
        .options label { display: block; margin-bottom: 10px; padding: 10px; background: #e9ecef; border-radius: 5px; cursor: pointer; transition: background 0.3s; border: 2px solid transparent;}
        .options label:hover { background: #dbe2e8; }
        input[type="radio"] { margin-right: 10px; }
        
        .reading-passage { background-color: #e8f4f8; padding: 15px; border-left: 4px solid #3498db; margin-bottom: 20px; font-style: italic; border-radius: 4px; color: #2c3e50; font-weight: normal; font-size: 1em; }

        .tf-statement { margin-bottom: 15px; padding: 15px; background: #e9ecef; border-radius: 5px; }
        .tf-statement p { margin: 0 0 10px 0; font-weight: 500; }
        .tf-options { display: flex; gap: 20px; }
        .tf-options label { flex: 1; text-align: center; margin: 0; padding: 8px; background: #fff; border: 1px solid #ccc; }

        .btn-submit { display: block; width: 100%; padding: 15px; font-size: 1.2em; background-color: #2ecc71; color: white; border: none; border-radius: 5px; cursor: pointer; margin-top: 30px; font-weight: bold; transition: background 0.3s; }
        .btn-submit:hover { background-color: #27ae60; }
        
        #mode2-progress { font-weight: bold; color: #e67e22; font-size: 1.2em; }
        .m2-feedback { margin-top: 15px; padding: 15px; border-radius: 5px; font-weight: bold; display: none; }
        .m2-correct { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .m2-incorrect { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .m2-warning { background-color: #fff3cd; color: #856404; border: 1px solid #ffeeba; }

        .correct { background-color: #d4edda !important; border-color: #2ecc71 !important; }
        .incorrect { background-color: #f8d7da !important; border-color: #e74c3c !important; }
        
        .result-box { text-align: center; margin-top: 20px; padding: 20px; background-color: #e8f8f5; border: 2px solid #2ecc71; border-radius: 8px; font-size: 1.2em; font-weight: bold; }
    </style>
</head>
<body class="hide-q-prefix">

<div class="container">

</div>

<script>
    function getOriginalQuizData() {
        return [
            { q: "Bài 17 - Câu 1: Pháp luật là hệ thống các quy tắc xử sự chung do nhà nước ban hành và được đảm bảo thực hiện bằng:", options: ["A. sức mạnh chuyên chính.", "B. tiềm lực tài chính quốc gia.", "C. quyền lực nhà nước.", "D. tính tự giác của nhân dân."], answer: 2 },
            { q: "Bài 17 - Câu 2: Luật hôn nhân gia đình quy định điều kiện kết hôn giữa nam và nữ áp dụng cho tất cả mọi người, không có ngoại lệ phản ánh đặc điểm cơ bản nào của pháp luật?", options: ["A. Tính xác định chặt chẽ về nội dung.", "B. Tính xác định chặt chẽ về hình thức.", "C. Tính quyền lực, bắt buộc chung.", "D. Tính quy phạm phổ biến."], answer: 3 },
            { q: "Bài 17 - Câu 3: Những quy tắc xử sự chung được áp dụng nhiều lần, ở nhiều nơi đối với tất cả mọi người là thể hiện đặc điểm nào dưới đây của pháp luật?", options: ["A. Tính chặt chẽ về hình thức.", "B. Tính kỉ luật nghiêm minh.", "C. Tính quy phạm phổ biến.", "D. Tính quyền lực, bắt buộc chung."], answer: 2 },
            { q: "Bài 17 - Câu 4: Những người có hành vi không đúng quy định của pháp luật sẽ bị cơ quan có thẩm quyền áp dụng các biện pháp cần thiết để buộc họ phải tuân theo. Điều này thể hiện đặc điểm nào dưới đây của pháp luật?", options: ["A. Tính quy phạm phổ biến.", "B. Tính quyền lực, bắt buộc chung.", "C. Hiệu lực tuyệt đối.", "D. Khả năng đảm bảo thi hành cao."], answer: 1 },
            { q: "Bài 17 - Câu 5: Cục thông tin và truyền thông đã quyết định xử phạt việc chị T đã có hành vi đăng tải lên trang cá nhân những thông tin trái với thuần phong mỹ tục... Việc làm của cục thông tin thể hiện đặc điểm nào?", options: ["A. Tính quyền lực bắt buộc chung.", "B. Tính quy phạm phổ biến.", "C. Tính chặt chẽ về hình thức.", "D. Tính kỉ luật nghiêm minh."], answer: 0 },
            { q: "Bài 17 - Câu 6: Tất cả mọi cá nhân, tổ chức nếu vi phạm pháp pháp luật đều phải bị xử lý như nhau. Điều đó thể hiện đặc điểm nào dưới đây của pháp luật?", options: ["A. Tính quyền lực bắt buộc chung.", "B. Tính công khai.", "C. Tính dân chủ.", "D. Tính qui phạm phổ biến."], answer: 0 },
            { q: "Bài 17 - Câu 7: Theo quy định của pháp luật, văn bản nào sau đây có hiệu lực pháp lý cao nhất?", options: ["A. Nghị định.", "B. Chỉ thị.", "C. Hiến pháp.", "D. Thông tư."], answer: 2 },
            { q: "Bài 17 - Câu 8: Nhờ có pháp luật, nhà nước mới kiểm tra, kiểm soát được các hoạt động của mọi cá nhân, tổ chức... nhằm ổn định trật tự. Nhận định này muốn đề cập đến nội dung nào?", options: ["A. Đặc trưng của pháp luật.", "B. Chức năng của pháp luật.", "C. Vai trò của pháp luật.", "D. Nhiệm vụ của pháp luật."], answer: 2 },
            { q: "Bài 17 - Câu 9: Pháp luật có vai trò như thế nào đối với công dân?", options: ["A. Cưỡng chế mọi nghĩa vụ của công dân.", "B. Bảo vệ mọi nhu cầu, lợi ích của công dân.", "C. Bảo vệ quyền, lợi ích tuyệt đối của công dân.", "D. Bảo vệ quyền và lợi ích hợp pháp của công dân."], answer: 3 },
            { q: "Bài 17 - Câu 10: Để quản lí xã hội bằng pháp luật một cách hiệu quả trên quy mô toàn xã hội... Nhà nước cần phải làm gì?", options: ["A. Ban hành và tổ chức thực hiện pháp luật.", "B. Tăng cường xử phạt thật nặng mọi người.", "C. Tổ chức tốt lực lượng xử phạt người dân.", "D. Ban hành và tổ chức phát triển kinh tế."], answer: 0 },
            { q: "Bài 17 - Câu 11: Văn bản pháp luật đòi hỏi phải được diễn đạt chính xác và chặt chẽ về mặt hình thức để người dân hiểu và thực hiện đúng là đặc điểm nào?", options: ["A. Tính quyền lực bắt buộc chung.", "B. Tính xác định chặt chẽ về hình thức.", "C. Tính quy phạm phổ biến.", "D. Tính cưỡng chế."], answer: 1 },
            { q: "Bài 17 - Câu 12: Nội dung của văn bản luật cấp dưới không được trái với nội dung của văn bản luật cấp trên và tất cả không được trái với Hiến pháp. Thể hiện đặc trưng nào?", options: ["A. Tính bắt buộc chung.", "B. Tuy phạm phổ biến.", "C. Tính xác định chặt chẽ về hình thức.", "D. Tính cưỡng chế."], answer: 2 },
            { q: "Bài 17 - Câu 13: Đặc điểm nào sau đây của pháp luật làm nên các quy tắc xử sự chung. Bất kì ai ở trong điều kiện, hoàn cảnh nhất định cũng phải xử sự theo khuôn mẫu?", options: ["A. Tính xác định chặt chẽ về hình thức.", "B. Tính xác định chặt chẽ về nội dung.", "C. Tính quy phạm phổ biến.", "D. Tính quyền lực, bắt buộc chung."], answer: 2 },
            { q: "Bài 17 - Câu 14: Đặc điểm nào sau đây của pháp luật là yếu tố quan trọng để phân biệt pháp luật với các loại quy phạm xã hội khác như đạo đức, tập quán?", options: ["A. Tính điều chỉnh quan hệ xã hội.", "B. Tính quy phạm phổ biến.", "C. Tính xác định chặt chẽ về hình thức.", "D. Tính xác định chặt chẽ về nội dung."], answer: 1 },
            { q: "Bài 17 - Câu 15: Việc Tòa án xử lý vi phạm của công ty A do chậm thanh toán đơn hàng là thể hiện đặc điểm nào dưới đây của pháp luật?", options: ["A. Tính thực tiễn xã hội.", "B. Tính quyền lực, bắt buộc chung.", "C. Tính xác định chặt chẽ về hình thức.", "D. Tính quy phạm phổ biến."], answer: 1 },
            { q: "Bài 17 - Câu 16: Căn cứ vào Luật Giao thông đường bộ, cảnh sát giao thông đã xử phạt... Pháp luật đã thể hiện vai trò gì đối với đời sống xã hội?", options: ["A. Là công cụ để bảo vệ trật tự an toàn giao thông.", "B. Là phương tiện để nhà nước quản lí xã hội.", "C. Là công cụ để nhân dân đấu tranh với người vi phạm.", "D. Là phương tiện để nhà nước trừng trị kẻ phạm tội."], answer: 1 },
            { q: "Bài 17 - Câu 17: Dấu hiệu nào sau đây của pháp luật là một trong những đặc điểm để phân biệt pháp luật với đạo đức?", options: ["A. Tính quyền lực, bắt buộc chung.", "B. Tính quy phạm phổ biến.", "C. Tính xác định chặt chẽ về hình thức.", "D. Tính xác định chặt chẽ về nội dung."], answer: 0 },
            { q: "Bài 17 - Câu 19: Những quy tắc xử sự chung về những việc được làm, những việc phải làm, những việc không được làm, những việc cấm đoán là phản ánh nội dung của khái niệm nào?", options: ["A. Kinh tế.", "B. Đạo đức.", "C. Pháp luật.", "D. Chính trị."], answer: 2 },
            { q: "Bài 17 - Câu 20: Pháp luật có vai trò như thế nào đối với công dân?", options: ["A. Bảo vệ quyền và lợi ích hợp pháp của công dân.", "B. Bảo vệ quyền, lợi ích tuyệt đối của công dân.", "C. Cưỡng chế mọi nghĩa vụ của công dân.", "D. Bảo vệ mọi nhu cầu, lợi ích của công dân."], answer: 0 },
            { q: "Bài 17 - Câu 21: Gia đình ông Q bị Chủ tịch UBND xã ra quyết định phá dỡ... Ông Q khiếu nại và được giải quyết. Pháp luật đã thể hiện vai trò gì đối với công dân?", options: ["A. Là phương tiện để nhà nước trừng trị kẻ phạm tội.", "B. Là công cụ để nhân dân đấu tranh với người vi phạm.", "C. Là công cụ để bảo vệ trật tự an toàn giao thông.", "D. Là phương tiện để bảo vệ quyền và lợi ích hợp pháp."], answer: 3 },
            { q: "Bài 17 - Câu 22: Nội dung nào dưới đây thể hiện vai trò quản lí xã hội bằng pháp luật của nhà nước?", options: ["A. Đăng nhập cổng thông tin quốc gia.", "B. Tự do đăng ký kết hôn theo quy định.", "C. Chấn chỉnh việc kinh doanh trái phép.", "D. Ca ngợi phong trào phòng chống dịch."], answer: 2 },
            { q: "Bài 17 - Câu 23: Chị P và anh K yêu nhau và muốn kết hôn, nhưng bố chị P lại muốn chị kết hôn với người khác nên đã cản trở việc kết hôn của chị. Thuyết phục bố không được, chị P phải viện dẫn điểm b khoản 1 Điều 8 Luật Hôn nhân và gia đình năm 2014, theo đó “Việc kết hôn do nam và nữ tự nguyện quyết định” thì bố chị mới đồng ý để hai người kết hôn với nhau. Trong trường hợp này, pháp luật đã thể hiện vai trò nào dưới đây đối với công dân?", options: ["A. Là phương tiện để mọi người đấu tranh trong những trường hợp cần thiết.", "B. Là yếu tố liên quan đến cuộc sống gia đình.", "C. Là yếu tố điều chỉnh suy nghĩ của mọi người.", "D. Là phương tiện để công dân bảo vệ quyền và lợi ích hợp pháp của mình."], answer: 3 },
            { q: "Bài 17 - Câu 24: Nhờ chị S có hiểu biết về pháp luật nên tranh chấp về đất đai đã được giải quyết ổn thỏa. Trường hợp này cho thấy pháp luật đã thể hiện vai trò nào?", options: ["A. Bảo vệ quyền và lợi ích hợp pháp của công dân.", "B. Bảo vệ quyền tham gia và quản lý xã hội.", "C. Bảo vệ quyền và tiêu sản của công dân.", "D. Bảo vệ quyền dân chủ của công dân."], answer: 0 },
            { q: "Bài 17 - Câu 25: Công ty A đã tuyển nhân viên mới thay thế vị trí của chị B trong thời gian chị nghỉ thai sản. Hết thời gian nghỉ thai sản, chị đi làm lại và bị chuyển sang công việc khác không phù hợp với chuyên môn. Chị B đã làm đơn khiếu nại gửi Ban chấp hành Công đoàn và Ban giám đốc. Xét thấy đơn khiếu nại của chị B là hợp lý nên Giám đốc đã bố trí lại công việc cho chị. Vấn đề trong tình huống trên được giải quyết thỏa đáng là nhờ vào đâu?", options: ["A. Đặc trưng của pháp luật.", "B. Vai trò của pháp luật.", "C. Đặc điểm của pháp luật.", "D. Yêu cầu của pháp luật."], answer: 1 },
            { q: "Bài 18 - Câu 1: Tổng thể các quy phạm pháp luật có mối liên hệ mật thiết và thống nhất với nhau được phân định thành các ngành luật, chế định pháp luật được gọi là gì?", options: ["A. Hệ thống pháp luật.", "B. Hệ thống tư pháp.", "C. Quy phạm pháp luật.", "D. Văn bản dưới luật."], answer: 0 },

    function formatQuestion(text) {
        return text.replace(/(Bài[^\n:]+?(?:Câu \d+)?:\s*|Phần[^\n:]+?(?:Câu \d+)?:\s*|Bài[^\n:]+?\s*-\s*|\(Đọc hiểu\)\s*-\s*)/i, '<span class="q-prefix">$&</span>');
    }

    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }

        document.getElementById('menu-screen').style.display = 'block';
        document.getElementById('mode1-screen').style.display = 'none';

    function startMode1() {
        document.getElementById('menu-screen').style.display = 'none';
        document.getElementById('mode1-screen').style.display = 'block';
        document.getElementById('result1').style.display = 'none';

    function renderMode1() {
        const mcqContainer = document.getElementById('mcq-container');
        const rtContainer = document.getElementById('rt-container');
        const tfContainer = document.getElementById('tf-container');
        mcqContainer.innerHTML = ''; rtContainer.innerHTML = ''; tfContainer.innerHTML = '';

        let globalQuestionCount = 1;

        currentMCQData.forEach((item, index) => {
            const qBlock = document.createElement('div');
            qBlock.className = 'question-block';
            qBlock.innerHTML = `<div class="question-title">Câu ${globalQuestionCount++}. ${formatQuestion(item.q)}</div>`;
            const optionsDiv = document.createElement('div');
            optionsDiv.className = 'options';
            item.options.forEach((opt, optIndex) => {
                optionsDiv.innerHTML += `<label id="l1-mcq-${index}-${optIndex}"><input type="radio" name="m1-mcq${index}" value="${optIndex}"> ${opt}</label>`;
            });
            qBlock.appendChild(optionsDiv);
            mcqContainer.appendChild(qBlock);
        });

        currentRTData.forEach((block, pIndex) => {
            const pBlock = document.createElement('div');
            pBlock.innerHTML = `<h3>Đoạn thông tin ${pIndex + 1}:</h3><div class="reading-passage">${block.passage}</div>`;
            
            block.questions.forEach((q, qIndex) => {
                const qBlock = document.createElement('div');
                qBlock.className = 'question-block';
                qBlock.innerHTML = `<div class="question-title">Câu ${globalQuestionCount++}. ${formatQuestion(q.q)}</div>`;
                const optionsDiv = document.createElement('div');
                optionsDiv.className = 'options';
                q.options.forEach((opt, optIndex) => {
                    optionsDiv.innerHTML += `<label id="l1-rt-${pIndex}-${qIndex}-${optIndex}"><input type="radio" name="m1-rt-${pIndex}-${qIndex}" value="${optIndex}"> ${opt}</label>`;
                });
                qBlock.appendChild(optionsDiv);
                pBlock.appendChild(qBlock);
            });
            rtContainer.appendChild(pBlock);
        });

        currentTFData.forEach((item, qIndex) => {
            const qBlock = document.createElement('div');
            qBlock.className = 'question-block';
            qBlock.innerHTML = `<div class="question-title">Câu ${globalQuestionCount++}. ${formatQuestion(item.q)}</div>`;
            item.statements.forEach((stmt, sIndex) => {
                qBlock.innerHTML += `
                    <div class="tf-statement">
                        <p>${stmt.text}</p>
                        <div class="tf-options">
                            <label id="l1-tf-${qIndex}-${sIndex}-true"><input type="radio" name="m1-tf-${qIndex}-${sIndex}" value="true"> Đúng</label>
                            <label id="l1-tf-${qIndex}-${sIndex}-false"><input type="radio" name="m1-tf-${qIndex}-${sIndex}" value="false"> Sai</label>
                        </div>
                    </div>`;
            });
            tfContainer.appendChild(qBlock);
        });
    }

    function submitMode1() {
        let scoreMCQ = 0, scoreRT = 0, scoreTF = 0;
        let totalMCQ = currentMCQData.length;
        let totalRT = 0;
        let totalTF = 0;

        currentMCQData.forEach((item, index) => {
            const selected = document.querySelector(`input[name="m1-mcq${index}"]:checked`);
            if (selected && parseInt(selected.value) === item.answer) {
                scoreMCQ++;
                document.getElementById(`l1-mcq-${index}-${item.answer}`).classList.add('correct');
            } else {
                if(selected) document.getElementById(`l1-mcq-${index}-${selected.value}`).classList.add('incorrect');
                document.getElementById(`l1-mcq-${index}-${item.answer}`).classList.add('correct');
            }
        });

        currentRTData.forEach((block, pIndex) => {
            block.questions.forEach((q, qIndex) => {
                totalRT++;
                const selected = document.querySelector(`input[name="m1-rt-${pIndex}-${qIndex}"]:checked`);
                if (selected && parseInt(selected.value) === q.answer) {
                    scoreRT++;
                    document.getElementById(`l1-rt-${pIndex}-${qIndex}-${q.answer}`).classList.add('correct');
                } else {
                    if(selected) document.getElementById(`l1-rt-${pIndex}-${qIndex}-${selected.value}`).classList.add('incorrect');
                    document.getElementById(`l1-rt-${pIndex}-${qIndex}-${q.answer}`).classList.add('correct');
                }
            });
        });

        currentTFData.forEach((item, qIndex) => {
            item.statements.forEach((stmt, sIndex) => {
                totalTF++;
                const selected = document.querySelector(`input[name="m1-tf-${qIndex}-${sIndex}"]:checked`);
                const ansStr = stmt.answer.toString();
                if (selected && selected.value === ansStr) {
                    scoreTF++;
                    document.getElementById(`l1-tf-${qIndex}-${sIndex}-${selected.value}`).classList.add('correct');
                } else {
                    if(selected) document.getElementById(`l1-tf-${qIndex}-${sIndex}-${selected.value}`).classList.add('incorrect');
                    document.getElementById(`l1-tf-${qIndex}-${sIndex}-${ansStr}`).classList.add('correct');
                }
            });
        });

        document.getElementById('btn-submit').style.display = 'none';
        const res = document.getElementById('result1');
        res.style.display = 'block';
        res.innerHTML = `Hoàn thành.<br>Trắc nghiệm: ${scoreMCQ}/${totalMCQ}<br>Đọc hiểu: ${scoreRT}/${totalRT}<br>Đúng/Sai: ${scoreTF}/${totalTF} ý`;
        window.scrollTo(0, document.body.scrollHeight);
    }

    // =================================================================
    // LOGIC CHẾ ĐỘ 2: LUYỆN TẬP TỪNG CÂU
    // =================================================================
    let flatMode2Data = []; 
    let currentQueue = [];  
    let wrongQueue = [];    
    let m2CurrentIndex = 0;
    let currentQuestionObj = null;
    let roundNumber = 1;
    
    // State machine điều hướng click toàn cục
    let mode2State = 'WAITING_FOR_ANSWER'; // Các trạng thái: WAITING_FOR_ANSWER, CORRECT_READY, INCORRECT_LOCKED, INCORRECT_READY

    function startMode2() {
        document.getElementById('menu-screen').style.display = 'none';
        document.getElementById('mode2-screen').style.display = 'block';
        document.getElementById('result2').style.display = 'none';
        document.getElementById('m2-question-container').style.display = 'block';

        flatMode2Data = flattenAllData(); 
        shuffleArray(flatMode2Data);
        
        currentQueue = [...flatMode2Data];
        wrongQueue = [];
        m2CurrentIndex = 0;
        roundNumber = 1;
        mode2State = 'WAITING_FOR_ANSWER';

        renderMode2Question();
    }

    function flattenAllData() {
        let arr = [];
        
        getOriginalQuizData().forEach(q => arr.push({
            passage: null, 
            q: q.q, 
            options: q.options, 
            answer: q.answer, 
            type: 'mcq'
        }));
        
        getRTQuizData().forEach(block => {
            block.questions.forEach(q => {
                arr.push({
                    passage: `[ĐỌC HIỂU]\nThông tin: ${block.passage}`, 
                    q: q.q,
                    options: q.options,
                    answer: q.answer,
                    type: 'mcq'
                });
            });
        });

        getTFQuizData().forEach(block => {
            block.statements.forEach(stmt => {
                arr.push({
                    passage: `[TÌNH HUỐNG]\n${block.q}`, 
                    q: `Nhận định: ${stmt.text}`,
                    options: ["A. Đúng", "B. Sai"],
                    answer: stmt.answer ? 0 : 1, 
                    type: 'tf'
                });
            });
        });
        return arr;
    }

    function renderMode2Question() {
        if (m2CurrentIndex >= currentQueue.length) {
            handleRoundEnd();
            return;
        }

        currentQuestionObj = currentQueue[m2CurrentIndex];
        const totalThisRound = currentQueue.length;
        
        document.getElementById('mode2-progress').innerText = `Vòng ${roundNumber} - Câu ${m2CurrentIndex + 1} / ${totalThisRound} (Đang nợ: ${wrongQueue.length} câu)`;
        
        const container = document.getElementById('m2-question-container');
        
        let html = `<div class="question-block">`;
        
        if (currentQuestionObj.passage) {
            html += `<div class="reading-passage">${formatQuestion(currentQuestionObj.passage).replace(/\n/g, '<br>')}</div>`;
        }
        
        html += `<div class="question-title">Câu ${m2CurrentIndex + 1}. ${formatQuestion(currentQuestionObj.q)}</div>
                 <div class="options">`;
        
        // Cập nhật onchange để tự động kích hoạt logic khi chọn đáp án
        currentQuestionObj.options.forEach((opt, idx) => {
            html += `<label id="l2-opt-${idx}">
                        <input type="radio" name="m2-ans" value="${idx}" onchange="handleAnswerSelection()"> ${opt}
                     </label>`;
        });
        html += `</div></div>`;
        
        container.innerHTML = html;

        const feedback = document.getElementById('m2-feedback');
        feedback.style.display = 'none';
        feedback.className = 'm2-feedback';
        
        mode2State = 'WAITING_FOR_ANSWER';
    }

    // Logic kiểm tra ngay khi người dùng chọn đáp án
    function handleAnswerSelection() {
        if (mode2State !== 'WAITING_FOR_ANSWER') return;

        const selected = document.querySelector('input[name="m2-ans"]:checked');
        if (!selected) return;

        const selVal = parseInt(selected.value);
        const correctAns = currentQuestionObj.answer;
        const feedback = document.getElementById('m2-feedback');
        
        document.querySelectorAll('input[name="m2-ans"]').forEach(r => r.disabled = true);

        if (selVal === correctAns) {
            document.getElementById(`l2-opt-${selVal}`).classList.add('correct');
            feedback.innerText = "Chính xác. Nhấp chuột bất kỳ đâu để chuyển sang câu tiếp theo.";
            feedback.className = 'm2-feedback m2-correct';
            feedback.style.display = 'block';

            const correctSound = new Audio('ktck2_10/correct.mp3');
            correctSound.play().catch(error => console.warn(error));

            // Trì hoãn siêu nhỏ để tránh thao tác click chọn đáp án vô tình kích hoạt chuyển câu
            setTimeout(() => {
                mode2State = 'CORRECT_READY';
            }, 100);
        } else {
            document.getElementById(`l2-opt-${selVal}`).classList.add('incorrect');
            document.getElementById(`l2-opt-${correctAns}`).classList.add('correct');
            feedback.innerText = "Chưa chính xác. Câu này sẽ được lưu lại. Vui lòng chờ 3 giây.";
            feedback.className = 'm2-feedback m2-incorrect';
            feedback.style.display = 'block';
            
            wrongQueue.push(currentQuestionObj);
            
            // Khóa trạng thái trong 3 giây
            mode2State = 'INCORRECT_LOCKED';
            
            setTimeout(() => {
                feedback.innerText = "Chưa chính xác. Nhấp chuột bất kỳ đâu để chuyển sang câu tiếp theo.";
                feedback.className = 'm2-feedback m2-warning';
                mode2State = 'INCORRECT_READY';
            }, 3000);
        }
    }

    // Bắt sự kiện click toàn cục (Global Click)
    document.addEventListener('click', function(event) {
        if (document.getElementById('mode2-screen').style.display === 'block') {
            if (mode2State === 'CORRECT_READY' || mode2State === 'INCORRECT_READY') {
                nextMode2Question();
            }
        }
    });

    function nextMode2Question() {
        mode2State = 'WAITING_FOR_ANSWER';
        m2CurrentIndex++;
        renderMode2Question();
    }

    function handleRoundEnd() {
        if (wrongQueue.length > 0) {
            alert(`Hoàn thành vòng ${roundNumber}. Hệ thống ghi nhận có ${wrongQueue.length} câu sai. Sẽ tiến hành ôn lại các câu chưa chính xác.`);
            roundNumber++;
            currentQueue = [...wrongQueue];
            wrongQueue = [];
            m2CurrentIndex = 0;
            shuffleArray(currentQueue); 
            renderMode2Question();
        } else {
            document.getElementById('m2-question-container').style.display = 'none';
            document.getElementById('m2-feedback').style.display = 'none';
            document.getElementById('mode2-progress').innerText = "Hoàn thành.";
            
            const res = document.getElementById('result2');
            res.style.display = 'block';
            res.innerHTML = `Hoàn thành bộ đề.<br><br>Tất cả các câu hỏi đã được trả lời chính xác sau ${roundNumber} vòng lặp.`;
        }
    }
</script>
</body>
</html>
